<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perfil - Tienda Premium</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-theme="light">
    <header class="header">
        <div class="logo">Tienda Premium</div>
        <nav>
            <a href="catalog.html">Catálogo</a>
            <a href="checkout.html">Carrito</a>
            <button id="logoutBtn">Cerrar sesión</button>
        </nav>
    </header>

    <main class="profile-container">
        <h1>Mi perfil</h1>
        <form id="profileForm">
            <input type="text" id="profileName" placeholder="Nombre">
            <input type="text" id="profileAvatar" placeholder="URL de avatar">
            <input type="text" id="profileAddress" placeholder="Dirección de envío">
            <button type="submit">Guardar cambios</button>
        </form>
        <img id="profileAvatarImg" alt="Avatar" class="avatar-preview">
        <p id="profileMsg"></p>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
